<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner SEB-2026</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#container{
  width:100%;
  max-width:420px;
}

#video{
  width:100%;
  border-radius:10px;
}

#status{
  margin-top:10px;
  text-align:center;
}

#code-box{
  margin-top:10px;
  background:#222;
  padding:10px;
  border-radius:8px;
  text-align:center;
}

#btn{
  margin-top:10px;
  width:100%;
  padding:12px;
  background:#4ade80;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

#result{
  margin-top:10px;
  padding:10px;
  display:none;
}
</style>
</head>

<body>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <div id="status">📷 Démarrage caméra...</div>
  <div id="code-box">--</div>
  <button id="btn" disabled>VÉRIFIER</button>
  <div id="result"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>

<script>
// ================= CONFIG =================
const WEBHOOK = 'https://cristi-honourless-nonmathematically.ngrok-free.dev/webhook/ticket-verify';
const PREFIX = 'SEB-2026-';
// ==========================================

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const statusEl = document.getElementById('status');
const codeBox = document.getElementById('code-box');
const btn = document.getElementById('btn');
const result = document.getElementById('result');

let lastCode = null;
let scanning = true;

// 🚀 CAMERA
async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment"
      }
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      statusEl.innerText = "🔍 Scan en cours...";
      setTimeout(scanLoop, 500);
    };

  }catch(e){
    statusEl.innerText = "❌ Caméra erreur";
  }
}

// 🔍 SCAN LOOP (VERSION STABLE)
function scanLoop(){

  if(!scanning){
    setTimeout(scanLoop, 300);
    return;
  }

  if(video.readyState !== video.HAVE_ENOUGH_DATA){
    setTimeout(scanLoop, 200);
    return;
  }

  if(video.videoWidth === 0){
    setTimeout(scanLoop, 200);
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);

  const code = jsQR(imageData.data, canvas.width, canvas.height, {
    inversionAttempts: "attemptBoth"
  });

  if(code){
    const val = code.data.trim();

    console.log("QR:", val);

    if(val.startsWith(PREFIX)){
      scanning = false;
      lastCode = val;

      codeBox.innerText = val;
      statusEl.innerText = "✅ QR détecté";

      btn.disabled = false;
    }
  }

  setTimeout(scanLoop, 150);
}

// 🔎 VERIFY
btn.addEventListener("click", async () => {
  if(!lastCode) return;

  btn.disabled = true;
  btn.innerText = "⏳ Vérification...";

  try{
    const res = await fetch(WEBHOOK,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        qr_code: lastCode
      })
    });

    const data = await res.json();

    result.style.display = "block";

    if(data.status && data.status.includes("VALIDE")){
      result.innerText = "✅ VALIDE";
    }else{
      result.innerText = "❌ REFUSÉ";
    }

  }catch(e){
    result.style.display = "block";
    result.innerText = "⚠️ erreur serveur";
  }

  setTimeout(()=>{
    scanning = true;
    lastCode = null;
    codeBox.innerText = "--";
    btn.disabled = true;
    btn.innerText = "VÉRIFIER";
    result.style.display = "none";
    statusEl.innerText = "🔍 Scan en cours...";
  },3000);
});

// START
startCamera();

</script>

</body>
</html>
