<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SCANNER SEB - PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #111;
            color: white;
            margin: 0;
        }

        h2 {
            margin-top: 15px;
        }

        #reader {
            width: 100%;
            max-width: 500px;
            margin: auto;
            border: 3px solid #0f0;
            border-radius: 10px;
            overflow: hidden;
        }

        #result {
            margin: 20px;
            padding: 15px;
            background: #222;
            border-radius: 10px;
        }

        #status {
            font-size: 16px;
            margin-bottom: 10px;
        }

        button {
            padding: 15px;
            background: #0f0;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            width: 100%;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <h2>🎫 SCANNER DE BILLETS SEB</h2>

    <div id="reader"></div>

    <div id="result">
        <p id="status">📷 En attente de scan...</p>
        <button id="send-btn" style="display:none;">VALIDER LE TICKET</button>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        let scannedCode = null;
        let scannerRunning = true;

        function beep() {
            const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
            audio.play();
        }

        function vibrate() {
            if (navigator.vibrate) {
                navigator.vibrate(200);
            }
        }

        function onScanSuccess(decodedText) {
            if (!scannerRunning) return;

            if (decodedText.includes("SEB-2026-")) {

                scannedCode = decodedText;
                scannerRunning = false;

                document.getElementById('status').innerHTML =
                    "✅ TICKET VALIDE : " + decodedText;

                document.getElementById('send-btn').style.display = "block";

                beep();
                vibrate();

                html5QrcodeScanner.clear();

            } else {
                document.getElementById('status').innerHTML =
                    "⚠️ QR NON VALIDE";
            }
        }

        function onScanFailure(error) {
            // silencieux pour performance
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            {
                fps: 10,
                qrbox: { width: 250, height: 250 },
                rememberLastUsedCamera: true,
                videoConstraints: {
                    facingMode: "environment"
                }
            }
        );

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        document.getElementById('send-btn').addEventListener('click', async () => {

            const btn = document.getElementById('send-btn');

            btn.disabled = true;
            btn.innerText = "⏳ Vérification...";

            document.getElementById('status').innerHTML =
                "📡 Envoi vers le serveur...";

            try {
                const res = await fetch('https://cristi-honourless-nonmathematically.ngrok-free.dev/webhook/ticket-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ qr_code: scannedCode })
                });

                const data = await res.json();

                if (data.status && data.status.includes("VALIDE")) {
                    alert("✅ ACCÈS AUTORISÉ");
                } else {
                    alert("❌ ACCÈS REFUSÉ");
                }

                location.reload();

            } catch (e) {
                alert("❌ Erreur serveur (ngrok ou n8n)");
                location.reload();
            }
        });
    </script>

</body>
</html>
