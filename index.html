<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEBUG SCANNER SEB</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 10px; }
        #video { width: 100%; border: 2px solid #333; border-radius: 10px; }
        #log { background: #111; padding: 10px; height: 100px; overflow-y: scroll; font-size: 12px; margin-top: 10px; border: 1px solid #0f0; }
        #btn { width: 100%; padding: 20px; background: #0f0; color: #000; font-weight: bold; border: none; margin-top: 10px; display:none; }
        .status-box { text-align: center; padding: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="status-box" id="status">INITIALISATION...</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="log">Logs système :<br></div>
    
    <button id="btn">VÉRIFIER LE CODE</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const logDiv = document.getElementById('log');
        const btn = document.getElementById('btn');
        const statusEl = document.getElementById('status');

        let lastCode = null;

        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function start() {
            addLog("Tentative accès caméra...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                addLog("Caméra OK. Lancement du scan...");
                statusEl.innerText = "🔍 RECHERCHE QR...";
                requestAnimationFrame(tick);
            } catch (e) {
                addLog("ERREUR CAMÉRA : " + e.message);
                statusEl.innerText = "❌ ERREUR CAMÉRA";
            }
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, canvas.width, canvas.height, {
                    inversionAttempts: "attemptBoth",
                });

                if (code) {
                    const val = code.data.trim();
                    addLog("QR TROUVÉ : " + val);
                    
                    if (val.startsWith("SEB-2026-")) {
                        statusEl.innerText = "✅ CODE VALIDE DÉTECTÉ";
                        lastCode = val;
                        btn.style.display = "block";
                        btn.innerText = "VÉRIFIER " + val;
                    } else {
                        addLog("Préfixe incorrect : " + val);
                    }
                }
            }
            // On scanne 2 fois par seconde pour ne pas figer le téléphone
            setTimeout(() => requestAnimationFrame(tick), 500);
        }

        btn.addEventListener('click', async () => {
            addLog("Envoi vers n8n...");
            try {
                // REMPLACE BIEN L'URL CI-DESSOUS PAR TON NGROK ACTUEL
                const res = await fetch('https://cristi-honourless-nonmathematically.ngrok-free.dev/webhook/ticket-verify', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ qr_code: lastCode })
                });
                const data = await res.json();
                addLog("RÉPONSE N8N : " + JSON.stringify(data));
                alert("Résultat : " + (data.status || "Inconnu"));
            } catch (e) {
                addLog("ERREUR WEBHOOK : " + e.message);
                alert("Erreur de connexion n8n. Vérifie ngrok !");
            }
        });

        start();
    </script>
</body>
</html>
