<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérif Tickets SEB-2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 24px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 13px;
        }
        
        .input-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: monospace;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        #result {
            display: none;
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #result.success {
            background: #e8f5e9;
            border: 2px solid #4caf50;
        }
        
        #result.error {
            background: #ffebee;
            border: 2px solid #f44336;
        }
        
        .result-icon {
            font-size: 48px;
            margin-bottom: 1rem;
        }
        
        .result-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        #result.success .result-title {
            color: #2e7d32;
        }
        
        #result.error .result-title {
            color: #c62828;
        }
        
        .result-message {
            font-size: 14px;
            color: #666;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            font-size: 13px;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎫 Vérif Tickets SEB-2026</h1>
        <p class="subtitle">Scanne avec une app, puis colle le code ici</p>
        
        <div class="info-box">
            📱 Utilise Google Lens ou n'importe quelle app QR standard pour scanner
        </div>
        
        <div class="input-group">
            <label for="qr-input">Code scanné:</label>
            <input 
                type="text" 
                id="qr-input" 
                placeholder="Ex: SEB-2026-001-K7F9" 
                autocomplete="off"
                spellcheck="false"
            >
        </div>
        
        <button id="verify-btn" onclick="verifyTicket()">VÉRIFIER</button>
        
        <div id="result">
            <div class="result-icon" id="result-icon">✅</div>
            <div class="result-title" id="result-title">Ticket valide</div>
            <div class="result-message" id="result-message">Entrée autorisée</div>
        </div>
    </div>

    <script>
        // ⚠️ REMPLACE CETTE URL PAR TON WEBHOOK N8N!
        const WEBHOOK_URL = 'https://cristi-honourless-nonmathematically.ngrok-free.dev/webhook/ticket-verify';

        const qrInput = document.getElementById('qr-input');
        const verifyBtn = document.getElementById('verify-btn');
        const resultBox = document.getElementById('result');

        // Auto-verify quand il y a assez de caractères
        qrInput.addEventListener('input', () => {
            if (qrInput.value.length > 10) {
                verifyTicket();
            }
        });

        // Permet de vérifier avec Entrée
        qrInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verifyTicket();
            }
        });

        async function verifyTicket() {
            const code = qrInput.value.trim().toUpperCase();

            if (!code) {
                showError('Veuillez entrer un code');
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.textContent = '⏳ Vérification...';
            resultBox.style.display = 'none';

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ qr_code: code })
                });

                const data = await response.json();

                if (data.status && data.status.includes('VALIDE')) {
                    showSuccess(data.message || 'Entrée autorisée ✅');
                } else {
                    showError(data.message || 'Ticket invalide ❌');
                }
            } catch (err) {
                showError('Erreur de connexion\nVérifie internet ou ngrok');
            } finally {
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'VÉRIFIER';
            }
        }

        function showSuccess(message) {
            resultBox.classList.remove('error');
            resultBox.classList.add('success');
            resultBox.style.display = 'block';
            document.getElementById('result-icon').textContent = '✅';
            document.getElementById('result-title').textContent = 'Ticket valide';
            document.getElementById('result-message').textContent = message;
        }

        function showError(message) {
            resultBox.classList.remove('success');
            resultBox.classList.add('error');
            resultBox.style.display = 'block';
            document.getElementById('result-icon').textContent = '❌';
            document.getElementById('result-title').textContent = 'Ticket invalide';
            document.getElementById('result-message').textContent = message;
        }

        // Focus automatique sur l'input
        qrInput.focus();
    </script>
</body>
</html>
