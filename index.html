<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCANNER SEB - ULTRA SENSITIVITY</title>

    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
        }

        #video {
            width: 100vw;
            height: 60vh;
            object-fit: cover;
            border-bottom: 2px solid #0f0;
        }

        #log-container {
            height: 40vh;
            padding: 10px;
            font-size: 11px;
            overflow-y: auto;
            background: #050505;
        }

        .success-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            padding: 25px;
            background: #0f0;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            display: none;
            z-index: 100;
            box-shadow: 0 0 20px #0f0;
            font-size: 1.2rem;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 60vh;
            border: 2px solid rgba(0,255,0,0.3);
            box-sizing: border-box;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #overlay::after {
            content: "";
            width: 70%;
            height: 70%;
            border: 2px solid #0f0;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div id="overlay"></div>

    <video id="video" autoplay playsinline></video>

    <canvas id="canvas" style="display:none;"></canvas>

    <button id="btn" class="success-btn">
        VÉRIFIER CE TICKET
    </button>

    <div id="log-container">
        <div style="color: #fff; font-weight: bold; border-bottom: 1px solid #333; margin-bottom: 5px;">
            SYSTEM LOGS (v3.0)
        </div>
        <div id="logs"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const logs = document.getElementById('logs');
        const btn = document.getElementById('btn');

        let lastCode = null;
        let scanCount = 0;

        function addLog(msg, color = "#0f0") {
            const div = document.createElement('div');
            div.style.color = color;
            div.innerHTML = `> ${msg}`;
            logs.insertBefore(div, logs.firstChild);
        }

        async function init() {
            addLog("Demande d'accès caméra (Standard)...", "#aaa");

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment"
                    }
                });

                video.srcObject = stream;
                video.setAttribute("playsinline", true);

                video.onloadedmetadata = () => {
                    video.play();
                    addLog("Caméra activée ! Début du scan...", "#4ade80");
                    requestAnimationFrame(tick);
                };

            } catch (e) {
                addLog("ERREUR CRITIQUE : " + e.name, "red");
                alert("La caméra est bloquée. Erreur : " + e.message);
            }
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                const code = jsQR(
                    imageData.data,
                    canvas.width,
                    canvas.height,
                    {
                        inversionAttempts: "attemptBoth"
                    }
                );

                scanCount++;

                if (scanCount % 10 === 0) {
                    addLog("Analyse en cours...");
                }

                if (code) {
                    const val = code.data.trim().toUpperCase();

                    addLog("QR IDENTIFIÉ : " + val, "#4ade80");

                    if (val.startsWith("SEB-2026-")) {
                        lastCode = val;

                        btn.style.display = "block";
                        btn.innerText = "VALIDER : " + val;

                        if (navigator.vibrate) {
                            navigator.vibrate(200);
                        }
                    }
                }
            }

            setTimeout(() => {
                requestAnimationFrame(tick);
            }, 150);
        }

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.innerText = "CONNEXION N8N...";

            addLog("Envoi vers le serveur...");

            try {
                const res = await fetch(
                    'https://cristi-honourless-nonmathematically.ngrok-free.dev/webhook/ticket-verify',
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            qr_code: lastCode
                        })
                    }
                );

                const data = await res.json();

                addLog("RÉPONSE : " + JSON.stringify(data));

                if (data.status && data.status.includes("VALIDE")) {
                    alert("✅ ACCÈS AUTORISÉ");
                } else {
                    alert("❌ ACCÈS REFUSÉ");
                }

            } catch (e) {
                addLog("ERREUR RÉSEAU : " + e.message, "red");
                alert("Erreur serveur. Vérifie ton ngrok !");
            }

            btn.style.display = "none";
            btn.disabled = false;
        });

        init();
    </script>

</body>
</html>
